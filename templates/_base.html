<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>{{ page_title or "Comfy Review" }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg: #0b0f17;
  --panel: #111827;
  --border: rgba(255,255,255,0.12);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.55);
  --radius: 14px;
  --shadow: 0 12px 30px rgba(0,0,0,0.35);
}

/* wichtig für dark native controls */
html{
  color-scheme: dark;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  /* dein ursprünglicher ambient glow */
  background:
    radial-gradient(circle at 15% 10%, rgba(50,197,255,0.18), transparent 35%),
    radial-gradient(circle at 85% 15%, rgba(46,204,113,0.15), transparent 40%),
    linear-gradient(180deg,#0b0f17,#0e1422 35%,#0b0f17);

  color: var(--text);
  padding: 20px;
}

h1,h2,h3{
  margin: 0 0 12px 0;
}

a{
  color: #32c5ff;
  text-decoration: none;
}
a:hover{
  text-decoration: underline;
}

.small{
  font-size: 12px;
  color: var(--muted);
}

/* -------------------- Buttons -------------------- */

button{
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s ease, border 0.12s ease;
}
button:hover{
  background: rgba(255,255,255,0.08);
}
button.danger{
  border-color: rgba(255,80,80,0.4);
  background: rgba(255,80,80,0.12);
}

/* -------------------- Pills -------------------- */

.pill{
  display:inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  margin-right: 6px;
  font-size: 12px;
}

/* -------------------- Topbar -------------------- */

.top{
  position: sticky;
  top: 12px;
  z-index: 50;

  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap: 12px;
  flex-wrap: wrap;

  margin-bottom: 14px;
  padding: 12px 14px;

  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: rgba(11,15,23,0.75);
  backdrop-filter: blur(12px);
}

/* -------------------- Navbar -------------------- */

.navbar{
  display:flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items:center;

  margin-left: auto;
  justify-content: flex-end;
  flex: 1 1 520px;

  padding: 6px 8px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03);
}

.navbar a{
  padding: 6px 10px;
  border-radius: 10px;
}
.navbar a:hover{
  background: rgba(255,255,255,0.06);
}

/* -------------------- Filter Section -------------------- */

.filter{
  display:flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;

  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);

  margin-bottom: 16px;
}

/* -------------------- Inputs -------------------- */

input[type="number"],
input[type="text"],
select,
textarea{
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text);
}

/* Dark dropdown styling */
select{
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-color: rgba(255,255,255,0.04);
}

option{
  background-color: #0f1624;
  color: rgba(255,255,255,0.92);
}

/* -------------------- Tables -------------------- */

table{
  width:100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td{
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  text-align:left;
}

th{
  background: rgba(255,255,255,0.04);
  font-weight: 600;
}

tr:hover{
  background: rgba(255,255,255,0.03);
}

/* -------------------- Generic Box -------------------- */

.box{
  padding: 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
}

</style>

{% block head %}{% endblock %}
</head>

<body>

{% block body %}{% endblock %}

{% block scripts %}{% endblock %}

</body>
</html>
