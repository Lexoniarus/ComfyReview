<div class="navbar">
  <a href="/">Review</a>
  <a href="/arena">Arena</a>
  <a href="/top_pictures">Top Pictures</a>
  <a href="/stats">Stats</a>
  <a href="/recommendations">Ergebnisse</a>
  <a href="/param_stats">Parameter</a>
  <a href="/prompt_tokens">Prompt Tokens</a>
  <a href="/playground">Playground</a>
</div>

<script>
(function () {
  const KEY = "comfyreview:last_query";

  const currentSearch = window.location.search || "";

  if (currentSearch && currentSearch.length > 1) {
    try { localStorage.setItem(KEY, currentSearch); } catch (e) {}
  }

  let qs = currentSearch;
  if (!qs || qs === "?") {
    try { qs = localStorage.getItem(KEY) || ""; } catch (e) { qs = ""; }
  }

  if (!qs || qs === "?") return;

  const links = document.querySelectorAll(".navbar a");
  links.forEach((a) => {
    const href = a.getAttribute("href") || "";
    if (!href) return;
    if (href.startsWith("http")) return;
    if (href.includes("?")) return;
    a.setAttribute("href", href + qs);
  });
})();
</script>
